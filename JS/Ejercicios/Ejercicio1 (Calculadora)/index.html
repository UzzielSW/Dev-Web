<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>calculadora</title>
    <style>
      form {
        outline: solid black;
        align-items: center;
      }
      label {
        display: block;
        padding-bottom: 5px;
      }

      .btn {
        background: white;
        border-radius: 1em;
      }
    </style>
  </head>
  <body>
    <form action="">
      <label for="numero1">numero 1</label>
      <input type="number" id="numero1" />

      <label for="numero2">numero 2</label>
      <input type="number" id="numero2" />

      <label for="resultado">Respuesta</label>
      <input type="number" id="resultado" disabled />
      <br /><br />
      <input class="btn" type="button" value="Sumar" id="Sumar" />
      <input class="btn" type="button" value="Restar" id="Restar" />
      <input class="btn" type="button" value="Multiplicar" id="Multiplicar" />
      <input class="btn" type="button" value="Dividir" id="Dividir" />
    </form>

    <script src="script.js"></script>
  </body>
</html>
