<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Pure Smash</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      href="https://file.myfontastic.com/xsJA3EUzViPcb5LbyudamB/icons.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <p class="title">
        Pure
        <b class="pink">S</b>
        <b class="green">M</b>
        <b class="yellow">A</b>
        <b class="red">S</b>
        <b class="violet">H</b>
      </p>
    </header>

    <div class="containerMenu" id="containerMenu">
      <ul>
        <li class="icon-play" id="Play">Play</li>
        <li class="icon-score" id="Score">Score</li>
      </ul>
    </div>

    <div class="esconder" id="containerPlay">
      <div id="game" class="game">
        <div id="boxcirculo" class="boxcirculo"></div>
        <div id="boxcuadro" class="boxcuadro"></div>
      </div>
      <div id="opciones" class="opciones"></div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
